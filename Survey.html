<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey SR Tool</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.sr-container {
  background: #e9e9e9;
  padding: 12px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.highlight {
  background: yellow;
  padding: 4px 8px;
  font-weight: bold;
}

button {
  padding: 6px 12px;
  border: none;
  background: #6c35a5;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

.section {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 6px;
}

.note {
  margin-top: 20px;
  background: #fff3a0;
  padding: 10px;
  border-radius: 5px;
  white-space: pre-line;
}

.alert {
  background: #ffcccc;
  color: red;
  padding: 10px;
  margin-top: 15px;
  border-radius: 5px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- SR -->
  <div class="sr-container">
    <strong>SR :</strong>
    <span id="srText" class="highlight"></span>
    <button onclick="copySR()">Copy 📋</button>
  </div>

  <!-- Options -->
  <div class="section">

    <p><b>Survey Completed?</b></p>
    <label><input type="radio" name="survey" value="yes"> YES</label>
    <label><input type="radio" name="survey" value="no"> NO</label>

    <p><b>Error: Get FTTH Path API Failed?</b></p>
    <label><input type="radio" name="api" value="yes"> YES</label>
    <label><input type="radio" name="api" value="no"> NO</label>

    <p><b>هل تم تجاوز SLA (5 Days)؟</b></p>
    <label><input type="radio" name="sla" value="yes"> YES</label>
    <label><input type="radio" name="sla" value="no"> NO</label>

  </div>

  <!-- Note -->
  <div class="note" id="noteBox" style="display:none;"></div>

  <!-- Alert -->
  <div id="alertBox" class="alert" style="display:none;"></div>

</div>

<script>
const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generateSR));

function generateSR() {
  const survey = document.querySelector('input[name="survey"]:checked')?.value;
  const api = document.querySelector('input[name="api"]:checked')?.value;
  const sla = document.querySelector('input[name="sla"]:checked')?.value;

  const srText = document.getElementById('srText');
  const noteBox = document.getElementById('noteBox');
  const alertBox = document.getElementById('alertBox');

  if (!survey || !api || !sla) return;

  let message = '';
  let note = '';
  let alert = '';

  // 🔴 SLA exceeded → create TT
  if (sla === 'yes') {
    message = 'TT Required → FTTH Survey Delay';

    alert = `
⚠️ SLA تم تجاوزها (5 Days)
يجب إنشاء TT فوراً والمتابعة مع الفريق المختص
    `;
  }

  // 🔴 API Error
  else if (api === 'yes') {
    message = 'FTTH Migration Issue -> No Free Port / API Failed';

    note = `
📌 Error: Get FTTH Path API Failed  
📌 يتم اعتبارها No Free Port  

📩 يتم إبلاغ العميل:
لا توجد أماكن متاحة حالياً وسيتم المتابعة عند توفر إمكانية التركيب  

⏱️ SLA: No estimated time
    `;
  }

  // 🟢 Normal Survey
  else if (survey === 'yes') {
    message = 'FBB Non Tech follow up -> FTTH Migration -> Readiness - CST Informed';

    note = `
📌 المرحلة: Survey  
📌 الفني من FO-Fiber بيزور العميل  

🔹 يتم:
- التأكد من جاهزية المكان  
- مد كابل الفايبر لحد باب الشقة  

⏱️ SLA: 5 Days
    `;
  }

  else {
    message = 'Pending Survey Follow Up';
  }

  srText.innerText = message;

  // Note
  if (note) {
    noteBox.style.display = 'block';
    noteBox.innerText = note;
  } else {
    noteBox.style.display = 'none';
  }

  // Alert
  if (alert) {
    alertBox.style.display = 'block';
    alertBox.innerText = alert;
  } else {
    alertBox.style.display = 'none';
  }
}

// Copy
function copySR() {
  const text = document.getElementById('srText').innerText;
  if (!text) return;

  navigator.clipboard.writeText(text);
  alert("Copied ✅");
}
</script>

</body>
</html>
