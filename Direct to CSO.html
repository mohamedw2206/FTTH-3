<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Direct to CSO Tool</title>

<style>
body {font-family: Arial; background:#f5f5f5; padding:20px;}
.container {background:#fff; padding:20px; border-radius:10px; max-width:850px; margin:auto;}

.section {margin-bottom:15px;}

#result {
  margin-top:20px;
  padding:15px;
  border-radius:8px;
  display:none;
  font-weight:bold;
  background:#fff3cd;
}

#note {
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  background:#eef7ff;
  display:none;
}

.step {
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-left:4px solid #007bff;
}

button {margin-top:10px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer;}
.copy {background:green; color:white;}
.reset {background:red; color:white;}
</style>

</head>
<body>

<div class="container">

<h3>Direct to CSO</h3>

<div class="section">
<label>Order in Direct to CSO Stage</label><br>
<label><input type="radio" name="cso" value="yes"> Yes</label>
<label><input type="radio" name="cso" value="no"> No</label>
</div>

<div id="result"></div>
<div id="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {

  const cso = document.querySelector('input[name="cso"]:checked')?.value;

  const result = document.getElementById("result");
  const note = document.getElementById("note");

  if (!cso) {
    result.style.display = "none";
    note.style.display = "none";
    return;
  }

  if (cso === "yes") {

    result.style.display = "block";
    note.style.display = "block";

    result.innerText =
    "SR: FBB Non Tech follow up -> FTTH Migration -> Direct to CSO - CST Informed Create";

    note.innerHTML = `

    <div class="step"><b>📌 Description:</b><br>
    لو الـ CPE Delivery Indoor → الأوردر بييجي في المرحلة دي بعد الـ Survey
    </div>

    <div class="step"><b>📌 Automatic TT:</b><br>
    ➜ FBB → Indoor Migration → Direct to CSO
    </div>

    <div class="step"><b>📊 SLA:</b><br>
    ➜ 24 ساعة (Activation Team Follow up)
    </div>

    <div class="step"><b>⚠️ ملحوظة مهمة:</b><br>
    ❌ ممنوع قفل الـ TT لأي سبب<br>
    ➜ فقط يتم إضافة Comment
    </div>

    <div class="step"><b>Step 1:</b> Activation Team يتابع مع العميل خلال 24 ساعة</div>

    <div class="step"><b>Step 2:</b> يتم إبلاغ العميل بالتوجه للفرع (CSO) لاستلام الجهاز</div>

    <div class="step"><b>Step 3:</b> دور الـ CCA:</div>

    <div class="step">
    ➜ تأكيد للعميل إنه لازم يروح الفرع<br>
    ➜ استلام جهاز الـ ONT
    </div>

    <div class="step"><b>Step 4:</b> تعليمات FTTH Migration:</div>

    <div class="step">
    ➜ لو العميل عنده CPE بإيجار شهري:<br>
    • يجيب الجهاز + الـ Adapter<br>
    • يقدر يحتفظ بيه ويدفع إيجار<br>
    • أو يرجعه للفرع
    </div>

    `;
  }

  else {
    result.style.display = "block";
    result.innerText = "No action required";
    note.style.display = "none";
  }
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
