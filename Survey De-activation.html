<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTTH Smart Tool</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 20px;
}
.container {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  max-width: 850px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.section {
  margin-bottom: 15px;
}
.options label {
  margin-right: 15px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  display: none;
  font-weight: bold;
}

#noteBox {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: #e7f3ff;
  display: none;
  line-height: 1.7;
}

.success { background: #d4edda; }
.warning { background: #fff3cd; }
.danger { background: #f8d7da; }

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.copy { background: #28a745; color: white; }
.reset { background: #dc3545; color: white; }
</style>

</head>
<body>

<div class="container">

<h2>FTTH Smart Decision Tool</h2>

<div class="section">
<label>Survey Grace Period</label><br>
<label><input type="radio" name="grace" value="yes"> Yes</label>
<label><input type="radio" name="grace" value="no"> No</label>
</div>

<div class="section">
<label>Customer Problem</label><br>
<label><input type="radio" name="problem" value="yes"> Yes</label>
<label><input type="radio" name="problem" value="no"> No</label>
</div>

<div class="section">
<label>Customer Reachable</label><br>
<label><input type="radio" name="reachable" value="yes"> Yes</label>
<label><input type="radio" name="reachable" value="no"> No</label>
</div>

<div class="section">
<label>Problem Resolved</label><br>
<label><input type="radio" name="resolved" value="yes"> Yes</label>
<label><input type="radio" name="resolved" value="no"> No</label>
</div>

<div id="result"></div>
<div id="noteBox"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {

  const grace = document.querySelector('input[name="grace"]:checked')?.value;
  const problem = document.querySelector('input[name="problem"]:checked')?.value;
  const reachable = document.querySelector('input[name="reachable"]:checked')?.value;
  const resolved = document.querySelector('input[name="resolved"]:checked')?.value;

  const box = document.getElementById("result");
  const noteBox = document.getElementById("noteBox");

  if (!grace || !problem || !reachable || !resolved) {
    box.style.display = "none";
    noteBox.style.display = "none";
    return;
  }

  let text = "";
  let cls = "";

  if (grace === "yes" && problem === "yes") {

    // 🔴 MSAN Deactivation case
    if (reachable === "no") {
      text = "SR: FBB Non Tech follow up -> FTTH Migration -> MSAN Deactivation - CST Informed Create";
      cls = "danger";

      noteBox.style.display = "block";
      noteBox.innerHTML = `
      <b>📌 التفاصيل:</b><br><br>

      ➜ الـ Order بيتنقل للـ <b>MSAN Deactivation Activity</b><br>
      ➜ بسبب إن Activation Team لم يستطيع الوصول للعميل<br><br>

      <b>📩 SMS:</b><br>
      يتم إرسال رسالة للعميل توضح:<br>
      ➜ إن خدمة MSAN سيتم إلغاؤها<br>
      ➜ لازم يتواصل مع 111 أو يزور الفرع لاستكمال الـ Migration<br><br>

      <b>📌 Automatic TT:</b><br>
      FTTH → NON Technical Problem Migration → Survey De-activation<br>
      <b>Work Group:</b> Dummy Group<br><br>

      <b>⚠️ ملحوظة:</b><br>
      ❌ غير مسموح إغلاق TT بـ Not Solved<br><br>

      <b>📞 لو العميل اتصل:</b><br>
      ➜ نبلغه إن الـ Migration هيكمل طبيعي<br>
      ➜ ينتظر زيارة الفني لتركيب الفايبر<br><br>

      ➜ لو سأل عن MSAN:<br>
      يتم توضيح إن الخدمة لم تعد متاحة على خطه<br><br>

      <b>✔ الإجراء:</b><br>
      ➜ يتم غلق TT بـ Success<br>
      ➜ الـ Order ينتقل للـ Activity التالية
      `;
    }

    else if (resolved === "yes") {
      text = "Close TT with success and continue order normally";
      cls = "success";
      noteBox.style.display = "none";
    }

    else {
      text = "SR: FBB Non Tech follow up -> FTTH Migration -> Survey Grace Period - CST Informed";
      cls = "warning";
      noteBox.style.display = "none";
    }

  } else {
    text = "Follow customer within 24H + Open TT";
    cls = "warning";
    noteBox.style.display = "none";
  }

  box.style.display = "block";
  box.className = cls;
  box.innerText = text;
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("noteBox").style.display = "none";
}

</script>

</body>
</html>
